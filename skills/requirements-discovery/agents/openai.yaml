interface:
  display_name: "Requirements Discovery"
  short_description: "Clarify requirements before planning or code"
  default_prompt: "Use the requirements-discovery skill. Act like a PM and principal architect, have an explicit back-and-forth conversation with me, and do not start planning or coding until I confirm the refined problem statement, Product AC, and Negative AC. Capture any obvious Technical AC notes for technical planning. Create one refinement-wave TPM reviewer and one architect reviewer only if they do not already exist; otherwise send this phase's delta to the existing reviewers. Optionally add persistent DBA or UX reviewers when the work materially needs database or user-experience expertise. Keep the refinement bench open for Phase 0, functional-plan, technical-plan, and execution-plan review. Use `frontier-review` for delegated refinement reviewers when available. If you create or update repo requirements/checkpoint docs, stage only those doc paths, commit them before leaving discovery, and record the commit hash."
