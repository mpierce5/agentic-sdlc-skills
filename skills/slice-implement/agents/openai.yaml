interface:
  display_name: "Slice Implement"
  short_description: "Implement and commit exactly one slice"
  default_prompt: "Use the slice-implement skill to implement exactly one reviewed execution-plan slice with tests first, targeted verification, clean-code retirement discipline, and an immediate commit when the slice is green. Before coding, identify the slice's Product AC, Technical AC, Negative AC, trace-table rows, final AC verification matrix rows, affected files, planned tests, required proof depth, expected AC coverage verdict, and clean-code retirement expectation. Remove unused/deprecated code, DB/schema/data objects, assets/images, docs, tests, scripts, config, dependencies, generated files, and failed-attempt work introduced by the slice before review; if this is the terminal clean-code retirement slice, inventory the whole wave and prove no references remain. Pass the compact AC/TAC, AC-signoff, and clean-code retirement packet to slice-review. Update the final AC verification matrix before committing."
