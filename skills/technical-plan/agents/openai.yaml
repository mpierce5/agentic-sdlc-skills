interface:
  display_name: "Technical Plan"
  short_description: "Create the reviewed technical plan"
  default_prompt: "Use the technical-plan skill to turn the reviewed functional plan into a reviewed technical plan with architecture boundaries, codebase fit, tradeoffs, test strategy, and explicit clean-code retirement decisions. Convert contract, boundary, invariant, forbidden-state, and no-compatibility decisions into explicit Technical AC. Carry forward Phase 0 hotspot findings, duplicate-pattern evidence, and the no-net-worsening statement; convert touched hotspots into prep refactors, deletion work, splits, extraction boundaries, or enforceable no-growth guardrails. Identify unused/deprecated code, DB/schema/data objects, assets/images, tests, docs, scripts, config, dependencies, generated files, compatibility paths, or failed-attempt work that execution planning must retire before final verification. Reuse the existing refinement-wave TPM reviewer and architect reviewer instead of spawning fresh reviewers; create them only if they do not already exist. Include persistent DBA or UX reviewers when database or user-facing technical decisions materially affect the plan. Keep the refinement bench open for execution-plan review. Use `frontier-review` for delegated refinement reviewers when available. If you create or update repo planning docs, stage only those doc paths and commit them before leaving the phase when the repo workflow permits commits; otherwise report the blocker and dirty doc paths."
