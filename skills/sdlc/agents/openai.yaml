interface:
  display_name: "SDLC"
  short_description: "Coordinate gated SDLC skills"
  default_prompt: "Use the sdlc skill as the lightweight coordinator for a phase-gated workflow. Immediately create and maintain an explicit checklist, load the relevant subskill before each phase, enforce confirmation/review/commit gates, and do not perform phase work from memory. Maintain one persistent TPM reviewer and one persistent architect reviewer across requirements, Phase 0, functional-plan, technical-plan, and execution-plan review; optionally add persistent DBA or UX reviewers when the work materially needs them. Send deltas to the same reviewers instead of spawning fresh reviewers, then close the refinement bench after execution-plan acceptance unless explicitly told otherwise. Require final AC verification matrix signoff for every Product AC, Technical AC, and Negative AC row before calling a wave complete. Delegate detailed requirements, refactor-health, functional planning, technical planning, execution planning, slice implementation, slice review, and state handling to the narrower skills."
