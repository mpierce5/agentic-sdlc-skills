interface:
  display_name: "Refactor Health"
  short_description: "Run Phase 0 architecture-fit review"
  default_prompt: "Use the refactor-health skill as the mandatory Phase 0 gate. Inspect the relevant repo seams before functional planning with concrete evidence: file-size hotspot table, duplicate-pattern searches, ownership boundaries, extraction candidates, and a no-net-worsening statement. Reuse the existing refinement-wave TPM reviewer and architect reviewer instead of spawning fresh reviewers; create them only if they do not already exist. Include persistent DBA or UX reviewers when Phase 0 risks materially involve data architecture, persistence, UX seams, accessibility, or interaction design. Keep the refinement bench open for functional-plan, technical-plan, and execution-plan review. Use `frontier-review` for delegated refinement reviewers when available. Decide whether to proceed directly, include bounded prep refactors, or pause for standalone refactor. Do not approve feature work that adds responsibility to a hotspot without an extraction, split, deletion, or enforceable no-growth guardrail. If you create or update repo planning docs, stage only those doc paths and commit them before leaving the phase when the repo workflow permits commits; otherwise report the blocker and dirty doc paths."
