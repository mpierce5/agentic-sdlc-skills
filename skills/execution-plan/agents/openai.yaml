interface:
  display_name: "Execution Plan"
  short_description: "Create the reviewed slice execution plan"
  default_prompt: "Use the execution-plan skill to create a reviewed slice-based execution plan where every slice has tests-first expectations, targeted verification, review/fix before broad verification, and an immediate commit after the slice is review-clean and green. Include both an AC trace table for planned coverage and a final AC verification matrix for behavior-level proof and reviewer signoff. Include a terminal clean-code retirement slice before final verification unless the plan explicitly records `not needed` after checking the full inventory for unused/deprecated code, DB/schema/data objects, assets/images, docs, tests, scripts, config, dependencies, generated files, and failed-attempt work. Each slice must name its assigned AC rows, expected AC coverage verdict, required proof depth, final matrix rows, clean-code retirement expectation, and compact AC/TAC reviewer packet. Convert Phase 0 hotspot findings into early prep slices, deletion/split/extraction work, or enforceable no-growth guardrails before dependent feature slices. Reuse the existing refinement-wave TPM reviewer and architect reviewer instead of spawning fresh reviewers; create them only if they do not already exist. Include persistent DBA or UX reviewers when the slice plan carries database or UX risk. Use `frontier-review` for delegated refinement reviewers when available, then close the refinement bench after execution-plan acceptance unless explicitly told otherwise. Stage only execution-plan doc paths and commit them before implementation starts when the repo workflow permits commits; otherwise report the blocker and dirty doc paths."
