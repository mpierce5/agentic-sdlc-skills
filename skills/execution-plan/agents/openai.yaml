interface:
  display_name: "Execution Plan"
  short_description: "Create the reviewed slice execution plan"
  default_prompt: "Use the execution-plan skill to create a reviewed slice-based execution plan where every slice has tests-first expectations, targeted verification, review/fix before broad verification, and an immediate commit after the slice is review-clean and green. Include an AC trace table mapping Product AC, Technical AC, and Negative AC to planned tests, affected files/contracts, responsible slices, and final verification gates. Each slice must name its assigned AC rows, expected AC coverage verdict, and compact AC/TAC reviewer packet. Convert Phase 0 hotspot findings into early prep slices, deletion/split/extraction work, or enforceable no-growth guardrails before dependent feature slices. Reuse the existing refinement-wave TPM reviewer and architect reviewer instead of spawning fresh reviewers; create them only if they do not already exist. Include persistent DBA or UX reviewers when the slice plan carries database or UX risk. Use `frontier-review` for delegated refinement reviewers when available, then close the refinement bench after execution-plan acceptance unless explicitly told otherwise. Stage only execution-plan doc paths, commit them before implementation starts, and record the commit hash."
