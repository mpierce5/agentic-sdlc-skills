interface:
  display_name: "Slice Review"
  short_description: "Review one committed slice"
  default_prompt: "Use the slice-review skill to review exactly one committed slice or current slice diff with one combined reviewer by default, then triage findings before the next risky slice begins. Default to SHALLOW routine review: diff-only first, mandatory AC/TAC trace validation and final AC verification matrix signoff for assigned Product AC, Technical AC, and Negative AC rows, and only the top 3-5 highest-impact findings for that pass. The cost-saving default is reviewer reuse plus compact context, not weak acceptance checking. Do not analyze broad diff stats, full branch history, or large tool outputs unless a failure specifically requires that expansion. Reuse valid cached plan excerpts, file summaries, prior findings, and test summaries before requesting raw context. If logs, browser output, API payloads, or test output are large, work from a compact failure summary first and only request the smallest raw excerpt needed. Output a compact metadata line with scope, model, AC coverage, AC signoff, and unchecked AC ids, then terse bullet issues only; no prose summary unless there are zero findings, and explanations only when critical. If there are no findings, output the metadata line followed by exactly `No findings.` Verification may be pending during the review/fix loop; avoid demanding broad tests after each small review-finding fix. Focused tests/checks for the exact code under edit are allowed during coding iterations. Escalate to DEEP or ACCEPTANCE review when abstractions, shared contracts, boundaries, UX-critical flows, repeated failures, or likely additional blocking issues make the shallow pass insufficient. Do not suppress known critical findings or call the slice clean when deeper review is warranted. At the final end-of-wave ACCEPTANCE gate, do not use one combined reviewer; use two separate reviewers instead: architect reviewer and TPM or acceptance reviewer. Prefer lighter review models or lighter reasoning for routine diff-only review, escalating only when slice risk or unresolved ambiguity justifies it. Reuse the same-run combined reviewer when appropriate, keep the reviewer open through same-slice finding fixes and re-review, avoid unlimited fresh review agents, use compact prompts to control token cost, and close idle, completed, stale, blocked, or superseded reviewers only after no same-slice follow-up remains."
