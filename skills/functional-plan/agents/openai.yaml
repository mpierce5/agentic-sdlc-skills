interface:
  display_name: "Functional Plan"
  short_description: "Create the reviewed functional plan"
  default_prompt: "Use the functional-plan skill to turn confirmed requirements into a reviewed high-level functional plan with scope, Product AC, Negative AC, UX-critical flows, edge cases, and a high-level test plan. Keep Product AC and Negative AC as explicit pass/fail rows that can feed the execution-plan trace table. Reuse the existing refinement-wave TPM reviewer and architect reviewer instead of spawning fresh reviewers; create them only if they do not already exist. Include persistent UX or DBA reviewers when user-experience or data behavior materially affects the functional plan. Keep the refinement bench open for technical-plan and execution-plan review. Use `frontier-review` for delegated refinement reviewers when available. If you create or update repo planning docs, stage only those doc paths and commit them before leaving the phase when the repo workflow permits commits; otherwise report the blocker and dirty doc paths."
